<!DOCTYPE html> <!--HTML5 표준을 따르는 문서임-->
<html>          <!--HTML 문서의 시작-->
    <head>      <!--HTML 문서의 Metadata 작성하는 부분-->
        <title> <!--웹 페이지의 제목을 "My Simple Web Page"로 설정-->
            My Simple Web Page
        </title>
    </head>     <!--head Element 닫는 Tage-->
    <body>      <!--HTML 문서의 본문 작성하는 부분-->
        <h1>    <!--헤딩(제목) 문구를 작성하는 Tag-->
            Explore the World of HTML!
        </h1>
        <p>     <!--문단을 작성하는 Tag-->
            Greetings from the Web!
        </p>
    </body>     <!--body Elements를 닫는 Tag-->
</html>         <!--html Elements를 닫는 Tag : HTML 문서의 끝-->
